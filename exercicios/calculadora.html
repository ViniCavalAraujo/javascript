<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>
    <h1>Calculadora</h1>
    <input type="number" name="num1" id="num1">
    <input type="number" name="num2" id="num2">
    <input type="button" value="somar" id="soma">
    <input type="button" value="subtrair" id="subtrair">
    <input type="button" value="multiplicar" id="multiplicar">
    <input type="button" value="dividir" id="dividir">

    <p id="resultado">Resultado aqui</p>

    <script>
        var soma = window.document.getElementById('soma')
        var subtrair = document.getElementById('subtrair')
        var multiplicar = document.getElementById('multiplicar')
        var dividir = document.getElementById('dividir')

        soma.addEventListener('click', somar)
        subtrair.addEventListener('click', sub)
        multiplicar.addEventListener('click', mult)
        dividir.addEventListener('click', div)

        function somar() {
            var caixa1 = window.document.getElementById('num1')
            var caixa2 = window.document.getElementById('num2')
            var res = window.document.getElementById('resultado')
            var n1 = Number(caixa1.value)
            var n2 = Number(caixa2.value)
            var soma = n1 + n2 

            res.innerText = soma
        }

        function sub() {
            var caixa1 = window.document.getElementById('num1')
            var caixa2 = window.document.getElementById('num2')
            var res = window.document.getElementById('resultado')
            var n1 = Number(caixa1.value)
            var n2 = Number(caixa2.value)
            var subt = n1 - n2

            res.innerText = subt
        }

        function mult() {
            var caixa1 = window.document.getElementById('num1')
            var caixa2 = window.document.getElementById('num2')
            var res = window.document.getElementById('resultado')
            var n1 = Number(caixa1.value)
            var n2 = Number(caixa2.value)
            var multiplicar = n1 * n2 

            res.innerText = multiplicar
        }

        function div() {
            var caixa1 = window.document.getElementById('num1')
            var caixa2 = window.document.getElementById('num2')
            var res = window.document.getElementById('resultado')
            var n1 = Number(caixa1.value)
            var n2 = Number(caixa2.value)
            var divisao = n1 / n2 

            if((n1==0) || (n2==0)) {
                res.innerText = 'não pode'
                return
            }

            res.innerText = divisao
        }

    </script>
</body>
</html>
