<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="num">Digite um número de 0 a 6</label>
    <input type="number" name="num" id="num">
    <input type="button" value="validar" name="button">
    <div class="res"></div>

    <script>
        var res = window.document.getElementsByClassName('res')[0]
        var bt = window.document.getElementsByName('button')[0]
        bt.addEventListener('click', diaSemana)

        function diaSemana() {
            var txtnum = window.document.getElementById('num')
            var diaSem = Number(txtnum.value)

            switch(diaSem) {
                case 0: 
                    res.innerHTML = 'Domingo'
                    break
                case 1: 
                    res.innerHTML = 'Segunda'
                    break
                case 2: 
                    res.innerHTML = 'Terça'
                    break
                case 3:
                    res.innerHTML = 'Quarta'
                    break
                case 4: 
                    res.innerHTML = 'Quinta'
                    break
                case 5:
                    res.innerHTML = 'Sexta'
                    break
                case 6:
                    res.innerHTML = 'Sábado'
                    break
                default:
                    res.innerHTML = 'Número inválido'
                    break
            }
        }
    </script>
</body>
</html>
