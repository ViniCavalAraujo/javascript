<!DOCTYPE html>

<head>

<body>

    <label for="videogame">Video game</label>
    <input type="checkbox" name="hobbie" id="videogame">

    <label for="esportes">Esportes</label>
    <input type="checkbox" name="hobbie" id="esportes">

    <label for="series">Séries</label>

    <label for="estudar">Estudar</label>
    <input type="checkbox" name="hobbie" id="estudar">
    
    <label for="culinaria">Culinária</label>
    <input type="checkbox" name="hobbie" id="culinaria">

    <label for="musica">Música</label>
    <input type="checkbox" name="hobbie" id="musica">

    <label for="outro">Outro</label>

    <input type="text" name="othobbie" id="othobbie">

    <input type="button" value="Enviar" onclick="validacao()">
    
    <script src="script.js"></script>
