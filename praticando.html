<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        var n = Number(window.prompt('Digite n'))
        n++
        document.write(`${n}`)
        window.alert(`Valor ${n.toLocaleString('pt-BR',{style:"currency", currency: 'BRL'})}`)
        document.write('<br>')

        var num = 20
        num+= 1
        document.write(num+'<br>')
        var a = 5
        var b = a * 3
        document.write(b+'<br>')
        var c = b % 4
        document.write(c)
    </script>
</body>
</html>
